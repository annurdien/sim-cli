name: Release Pipeline

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  check-release:
    name: Check Release Trigger
    runs-on: ubuntu-latest
    outputs:
      should-release: ${{ steps.check.outputs.should-release }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check if commit message contains 'release:'
      id: check
      run: |
        COMMIT_MSG=$(git log -1 --pretty=%B)
        if [[ "$COMMIT_MSG" == *"release:"* ]]; then
          echo "should-release=true" >> $GITHUB_OUTPUT
          echo "Release commit detected: $COMMIT_MSG"
        else
          echo "should-release=false" >> $GITHUB_OUTPUT
          echo "Not a release commit: $COMMIT_MSG"
        fi

  release:
    name: Release
    runs-on: ${{ matrix.os }}
    needs: check-release
    if: needs.check-release.outputs.should-release == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.24.x

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v8.0.0
      with:
        version: latest
        args: --timeout=5m

    - name: Run tests
      run: go test ./...

    - name: Build application
      run: make build

    - name: Build for multiple platforms
      run: make build-all

    - name: Create checksums (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        cd dist
        sha256sum * > checksums.txt

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sim-cli-binaries-${{ matrix.os }}
        path: |
          dist/
          
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [check-release, release]
    if: needs.check-release.outputs.should-release == 'true'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-files/
        merge-multiple: true
        
    - name: Extract version from config.yaml
      id: version
      run: |
        VERSION_RAW=$(grep 'version:' config.yaml | awk '{print $2}' | tr -d '"')
        VERSION="v$VERSION_RAW"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Extracted version: $VERSION"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: Release ${{ steps.version.outputs.version }}
        body: |
          Release created from commit: ${{ github.sha }}
          
          ## Changes
          ${{ github.event.head_commit.message }}
          
          ## Downloads
          - `sim-darwin-amd64`: macOS Intel
          - `sim-darwin-arm64`: macOS Apple Silicon  
          - `sim-linux-amd64`: Linux x64
          - `sim-windows-amd64.exe`: Windows x64
        files: |
          release-files/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew-formula:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: [check-release, create-release]
    if: needs.check-release.outputs.should-release == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from config.yaml
        id: version
        run: |
          VERSION_RAW=$(grep 'version:' config.yaml | awk '{print $2}' | tr -d '"')
          VERSION="v$VERSION_RAW"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Calculate SHA256 for macOS AMD64
        id: sha_mac_amd64
        run: |
          SHA=$(curl -sL \
            "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/sim-darwin-amd64" \
            | sha256sum | cut -d' ' -f1)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Calculate SHA256 for macOS ARM64
        id: sha_mac_arm64
        run: |
          SHA=$(curl -sL \
            "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/sim-darwin-arm64" \
            | sha256sum | cut -d' ' -f1)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Calculate SHA256 for Linux AMD64
        id: sha_linux_amd64
        run: |
          SHA=$(curl -sL \
            "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/sim-linux-amd64" \
            | sha256sum | cut -d' ' -f1)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Clone homebrew-tap
        run: |
          git clone \
            "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/annurdien/homebrew-tap.git" \
            homebrew-tap

      - name: Generate formula
        run: |
          VERSION_NUM="${{ steps.version.outputs.version }}"
          VERSION_NUM="${VERSION_NUM#v}"

          mkdir -p homebrew-tap/Formula

          cat > homebrew-tap/Formula/sim-cli.rb << EOF
          class SimCli < Formula
            desc "CLI tool to manage iOS simulators and Android emulators"
            homepage "https://github.com/${{ github.repository }}"
            version "${VERSION_NUM}"
            license "MIT"

            depends_on "ffmpeg"

            if OS.mac? && Hardware::CPU.intel?
              url "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/sim-darwin-amd64"
              sha256 "${{ steps.sha_mac_amd64.outputs.sha }}"
            elsif OS.mac? && Hardware::CPU.arm?
              url "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/sim-darwin-arm64"
              sha256 "${{ steps.sha_mac_arm64.outputs.sha }}"
            elsif OS.linux? && Hardware::CPU.intel?
              url "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/sim-linux-amd64"
              sha256 "${{ steps.sha_linux_amd64.outputs.sha }}"
            end

            def install
              if OS.mac? && Hardware::CPU.intel?
                bin.install "sim-darwin-amd64" => "sim"
              elsif OS.mac? && Hardware::CPU.arm?
                bin.install "sim-darwin-arm64" => "sim"
              elsif OS.linux? && Hardware::CPU.intel?
                bin.install "sim-linux-amd64" => "sim"
              end
            end

            test do
              system "#{bin}/sim", "--version"
            end
          end
          EOF

          echo "Generated formula:"
          cat homebrew-tap/Formula/sim-cli.rb

      - name: Commit and push formula
        run: |
          cd homebrew-tap
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add Formula/sim-cli.rb
          git diff --cached --quiet && echo "No changes to formula" && exit 0
          git commit -m "sim-cli ${{ steps.version.outputs.version }}"
          git push
